                                for (const taskIdIndex of statusGroup.taskIdIds[i]) {
                                    const jobName = currentData.tables.jobNames[currentData.taskInfo.jobNameIds[taskIdIndex]];
                                    const platform = extractPlatform(jobName) || 'unknown';
                                    const variant = extractVariant(jobName);
                                    addDayCell(day, `${variant}|${platform}`);
                                }
                            }
                        }
                    }
                }

                return result;
            });
        }

        function updateSelection() {
            updateChartHighlight();
            updateTableHighlight();
            updateIssueListFilter();
            updateRuntimeForSelection();
        }

        // Compute issue-filtered daily rates for a single issue
        function computeIssueFilteredRates(issueIndex) {
            if (!allIssuesGlobal || !dailyRateDataGlobal || testIdGlobal === null) return null;
            const issue = allIssuesGlobal[issueIndex];
            const dailyData = calculateIssueMessageDailyRates(testIdGlobal, issue.type, issue.message);
            if (!dailyData) return null;

            return dailyData.map((d, i) => {
                const overall = dailyRateDataGlobal[i];
                const totalNonSkip = overall.passes + overall.failures + overall.timeouts + overall.crashes;
                const totalWithSkips = totalNonSkip + overall.skips;
                return {
                    failureRate: issue.type === 'FAIL' && totalNonSkip > 0 ? (d.count / totalNonSkip * 100) : 0,
                    timeoutRate: issue.type === 'TIMEOUT' && totalNonSkip > 0 ? (d.count / totalNonSkip * 100) : 0,
                    crashRate: issue.type === 'CRASH' && totalNonSkip > 0 ? (d.count / totalNonSkip * 100) : 0,
                    skipRate: issue.type === 'SKIP' && totalWithSkips > 0 ? (d.count / totalWithSkips * 100) : 0,
                };
            });
        }

        // Compute cell-filtered daily rates from dayJobMatrix
        function computeCellFilteredRates(activeCells) {
            if (!dayJobMatrix || !dailyRateDataGlobal) return null;
            return dayJobMatrix.map((dayData, d) => {
                let cellFailures = 0, cellTimeouts = 0, cellCrashes = 0, cellSkips = 0;
                for (const cellKey of activeCells) {
                    const cd = dayData[cellKey];
                    if (cd) {
                        cellFailures += cd.failures;
                        cellTimeouts += cd.timeouts;
                        cellCrashes += cd.crashes;
                        cellSkips += cd.skips;
                    }
                }
                // Use overall denominator so bars show the cell's subset of the total rate
                const overall = dailyRateDataGlobal[d];
                const totalNonSkip = overall.passes + overall.failures + overall.timeouts + overall.crashes;
                const totalWithSkips = totalNonSkip + overall.skips;
                return {
                    failureRate: totalNonSkip > 0 ? (cellFailures / totalNonSkip * 100) : 0,
                    timeoutRate: totalNonSkip > 0 ? (cellTimeouts / totalNonSkip * 100) : 0,
                    crashRate: totalNonSkip > 0 ? (cellCrashes / totalNonSkip * 100) : 0,
                    skipRate: totalWithSkips > 0 ? (cellSkips / totalWithSkips * 100) : 0,
                };
            });
        }

        function updateSingleChartHighlight(chart, skipCellFilter, overrideRates) {
            if (!chart) return;

            const activeCells = getActiveCells();
            const activeDays = getActiveDays();
            const hasCellFilter = activeCells.size > 0 && !skipCellFilter;
            const hasDayFilter = activeDays.size > 0;
            const hasOverride = overrideRates !== undefined && overrideRates !== null;

            // Build a cache key to skip chart.update() when nothing changed
            const cellKey = hasOverride ? 'issue' + selectionState.hoveredIssueIndex :
                            hasCellFilter ? Array.from(activeCells).sort().join(',') : '';
            const dayKey = hasDayFilter ? selectionState.hoveredDay + '|' + Array.from(selectionState.clickedDays).join(',') : '';
            const cacheKey = cellKey + '/' + dayKey;
            if (chart._lastHighlightKey === cacheKey) return;
            chart._lastHighlightKey = cacheKey;

            const numBars = chart.data.labels.length;

            // Override rates (from issue hover) or cell filter
            if (hasOverride || hasCellFilter) {
                const filtered = hasOverride ? overrideRates : computeCellFilteredRates(activeCells);
                if (filtered) {
                    for (const dataset of chart.data.datasets) {
                        if (dataset._isRemainder) {
                            dataset.data = dataset._origData.map((val, i) =>
                                Math.max(0, val - filtered[i][dataset._rateField]));
                        } else {
                            dataset.data = filtered.map(r => r[dataset._rateField]);
                        }
                    }
                }
                // Store raw cell daily counts for tooltips (not for issue hover)
                if (!hasOverride) {
                    chart._cellDailyData = dayJobMatrix?.map(dayData => {
                        const r = {failures: 0, timeouts: 0, crashes: 0, skips: 0};
                        for (const cellKey of activeCells) {
                            const cd = dayData[cellKey];
                            if (cd) { r.failures += cd.failures; r.timeouts += cd.timeouts; r.crashes += cd.crashes; r.skips += cd.skips; }
                        }
                        return r;
                    });
                } else {
                    chart._cellDailyData = null;
                }
            } else {
                for (const dataset of chart.data.datasets) {
                    if (dataset._isRemainder) {
                        dataset.data = new Array(numBars).fill(0);
                    } else {
                        dataset.data = dataset._origData.slice();
                    }
                }
                chart._cellDailyData = null;
            }

            // Store active days for the column highlight plugin
            chart._hoveredDay = selectionState.hoveredDay;
            chart._clickedDays = selectionState.clickedDays.size > 0 ? selectionState.clickedDays : null;

            chart.update('none');
        }

        // Determine which issue types the active cells have across all days
        function getActiveCellIssueTypes(activeCells) {
            if (!dayJobMatrix || activeCells.size === 0) return { hasIssues: false, hasSkips: false };
            let hasIssues = false, hasSkips = false;
            for (const dayData of dayJobMatrix) {
                for (const cellKey of activeCells) {
                    const cd = dayData[cellKey];
                    if (!cd) continue;
                    if (cd.failures > 0 || cd.crashes > 0 || cd.timeouts > 0) hasIssues = true;
                    if (cd.skips > 0) hasSkips = true;
                    if (hasIssues && hasSkips) return { hasIssues, hasSkips };
                }
            }
            return { hasIssues, hasSkips };
        }

        function updateChartHighlight() {
            // Issue hover overrides cell hover for chart filtering
            const issueIdx = selectionState.hoveredIssueIndex;
            if (issueIdx !== null && allIssuesGlobal) {
                const issue = allIssuesGlobal[issueIdx];
                const rates = computeIssueFilteredRates(issueIdx);
                const isSkip = issue.type === 'SKIP';
                updateSingleChartHighlight(failureRateChart, true, isSkip ? null : rates);
                updateSingleChartHighlight(skipRateChart, true, isSkip ? rates : null);
                return;
            }

            const activeCells = getActiveCells();
            const { hasIssues, hasSkips } = activeCells.size > 0
                ? getActiveCellIssueTypes(activeCells)
                : { hasIssues: false, hasSkips: false };

            // Only update a chart if the active cells are relevant to it
            updateSingleChartHighlight(failureRateChart, activeCells.size > 0 && !hasIssues);
            updateSingleChartHighlight(skipRateChart, activeCells.size > 0 && !hasSkips);
        }

        function updateTableHighlight() {
            const activeDays = getActiveDays();
            const hasDayFilter = activeDays.size > 0;

            document.querySelectorAll('.job-cell[data-variant]').forEach(cell => {
                const key = `${cell.dataset.variant}|${cell.dataset.platform}`;
                cell.classList.toggle('cell-selected', selectionState.clickedCells.has(key));

                const badges = cell.querySelectorAll('[data-type]');

                if (hasDayFilter && dayJobMatrix) {
                    cell._dayFiltered = true;
                    // Sum counts for selected days only
                    const f = {passes: 0, failures: 0, timeouts: 0, crashes: 0, skips: 0};
                    for (const day of activeDays) {
                        const dayData = dayJobMatrix[day]?.[key];
                        if (dayData) {
                            f.passes += dayData.passes;
                            f.failures += dayData.failures;
                            f.timeouts += dayData.timeouts;
                            f.crashes += dayData.crashes;
                            f.skips += dayData.skips;
                        }
                    }
                    const total = f.passes + f.failures + f.timeouts + f.crashes;
                    const countOf = { fail: f.failures, crash: f.crashes, timeout: f.timeouts, pass: f.passes, skip: f.skips };

                    const allIssuesHidden = f.failures === 0 && f.crashes === 0 && f.timeouts === 0;
                    const noData = total === 0 && f.skips === 0;

                    // Toggle overlay prefix badges (em-dash, prefix PASS)
                    const hasPrefix = cell.querySelector('[data-prefix]') !== null;
                    cell.querySelectorAll('[data-type="na"]').forEach(el => {
                        el.style.display = noData ? '' : 'none';
                    });
                    cell.querySelectorAll('[data-prefix]').forEach(el => {
                        const show = allIssuesHidden && f.passes > 0 && !noData;
                        el.style.display = show ? '' : 'none';
                        if (show) el.title = `${f.passes} run${f.passes !== 1 ? 's' : ''}`;
                    });

                    // Hide badges layer only when an overlay replaces it:
                    // - noData: em-dash overlay
                    // - hasPrefix && allIssuesHidden: prefix PASS overlay
                    // For pass-only or skip-only cells (no prefix), layer stays visible.
                    const layer = cell.querySelector('.badges-layer');
                    if (layer) {
                        layer.style.visibility = (noData || (hasPrefix && allIssuesHidden)) ? 'hidden' : '';
                    }

                    // Update individual badges within the layer
                    badges.forEach(badge => {
                        if (badge.dataset.prefix || badge.dataset.type === 'na') return;
                        const type = badge.dataset.type;
                        const count = countOf[type] || 0;
                        if (type === 'pass') {
                            badge.style.visibility = f.passes > 0 ? '' : 'hidden';
                            if (f.passes > 0) badge.title = `${f.passes} run${f.passes !== 1 ? 's' : ''}`;
                        } else if (type === 'skip') {
                            badge.style.visibility = count > 0 ? '' : 'hidden';
                            if (count > 0) badge.title = `${count} skip${count !== 1 ? 's' : ''}`;
                        } else {
                            badge.style.visibility = count > 0 ? '' : 'hidden';
                            if (count > 0) {
                                const pct = total > 0 ? ((count / total) * 100).toFixed(1) : '0.0';
                                const pctEl = badge.querySelector('.badge-pct');
                                if (pctEl) pctEl.textContent = `${pct}%`;
                                else badge.textContent = `${type.toUpperCase()} ${pct}%`;
                            }
                        }
                    });

                    // Suppress hover on cells showing only PASS or em-dash
                    const hasVisibleIssues = f.failures > 0 || f.crashes > 0 || f.timeouts > 0 || f.skips > 0;
                    cell.classList.toggle('no-hover', !hasVisibleIssues);
                } else if (cell._dayFiltered) {
                    cell._dayFiltered = false;
                    cell.innerHTML = originalCellContent.get(cell);
                    cell.classList.toggle('no-hover', !cell.querySelector('.badges-layer [data-type="fail"], .badges-layer [data-type="crash"], .badges-layer [data-type="timeout"], .badges-layer [data-type="skip"]'));
                }
            });
        }

        function updateIssueListFilter() {
            if (!issueFilterData) return;

            const activeDays = getActiveDays();
            const activeCells = getActiveCells();
            const hasFilter = activeDays.size > 0 || activeCells.size > 0;

            let visibleCount = 0;
            let totalCount = 0;

            document.querySelectorAll('.issue-item[data-issue-index]').forEach(item => {
                totalCount++;
                const index = parseInt(item.dataset.issueIndex);
                const filterInfo = issueFilterData[index];

                const countSpan = item.querySelector('.issue-count');
                const originalCount = allIssuesGlobal[index].count;

                if (!hasFilter || !filterInfo) {
                    item.classList.remove('issue-hidden');
                    visibleCount++;
                    if (countSpan) countSpan.textContent = originalCount;
                    // Unhide associated elements and refresh expanded runs/chart
                    const issueId = item.dataset.issueId;
                    if (issueId) {
                        const chartEl = document.getElementById(`${issueId}-chart`);
                        const runsEl = document.getElementById(`${issueId}-runs`);
                        if (chartEl) chartEl.classList.remove('issue-hidden');
                        if (runsEl) {
                            runsEl.classList.remove('issue-hidden');
                            if (runsEl.style.display !== 'none') {
                                const testId = parseInt(item.dataset.testId);
                                const issueType = item.dataset.issueType;
                                const issueMessage = item.dataset.issueMessage.replace(/&quot;/g, '"');
                                runsEl.innerHTML = getIssueRuns(
                                    testId, item.dataset.testPath,
                                    issueType, issueMessage,
                                    activeDays, activeCells);
                                if (chartEl && chartEl.style.display !== 'none') {
                                    const dailyData = calculateIssueMessageDailyRates(testId, issueType, issueMessage, activeCells);
                                    if (dailyData) createIssueMessageChart(`${issueId}-canvas`, dailyData, issueType);
                                }
                            }
                        }
                    }
                    return;
                }

                let filteredCount = 0;
                const hasDayFilter = activeDays.size > 0;
                const hasCellFilter = activeCells.size > 0;

                if (hasDayFilter && hasCellFilter) {
                    for (const day of activeDays) {
                        const cellsOnDay = filterInfo.dayCells.get(day);
                        if (!cellsOnDay) continue;
                        for (const cell of activeCells) {
                            filteredCount += cellsOnDay.get(cell) || 0;
                        }
                    }
                } else if (hasDayFilter) {
                    for (const day of activeDays) {
                        filteredCount += filterInfo.days.get(day) || 0;
                    }
                } else if (hasCellFilter) {
                    for (const cell of activeCells) {
                        filteredCount += filterInfo.cells.get(cell) || 0;
                    }
                }

                const visible = filteredCount > 0;
                item.classList.toggle('issue-hidden', !visible);
                if (visible) visibleCount++;
                if (countSpan) countSpan.textContent = visible ? filteredCount : originalCount;

                const issueId = item.dataset.issueId;
                if (issueId) {
                    const chartEl = document.getElementById(`${issueId}-chart`);
                    const runsEl = document.getElementById(`${issueId}-runs`);
                    if (chartEl) chartEl.classList.toggle('issue-hidden', !visible);
                    if (runsEl) {
                        runsEl.classList.toggle('issue-hidden', !visible);
                        if (visible && runsEl.style.display !== 'none') {
                            const testId = parseInt(item.dataset.testId);
                            const issueType = item.dataset.issueType;
                            const issueMessage = item.dataset.issueMessage.replace(/&quot;/g, '"');
                            runsEl.innerHTML = getIssueRuns(
                                testId, item.dataset.testPath,
                                issueType, issueMessage,
                                activeDays, activeCells);
                            if (chartEl && chartEl.style.display !== 'none') {
                                const dailyData = calculateIssueMessageDailyRates(testId, issueType, issueMessage, activeCells);
                                if (dailyData) createIssueMessageChart(`${issueId}-canvas`, dailyData, issueType);
                            }
                        }
                    }
                }
            });

            const notice = document.getElementById('issue-filter-notice');
            if (notice) {
                if (hasFilter) {
                    const parts = [];
                    if (activeDays.size > 0 && dailyRateDataGlobal) {
                        const dates = Array.from(activeDays).sort((a, b) => a - b)
                            .map(d => dailyRateDataGlobal[d]?.date).filter(Boolean);
                        if (dates.length === 1) parts.push(dates[0]);
                        else if (dates.length <= 3) parts.push(dates.join(', '));
                        else parts.push(`${dates[0]} \u2013 ${dates[dates.length - 1]}`);
                    }
                    if (activeCells.size > 0) {
                        const cellNames = Array.from(activeCells).map(k => {
                            const [variant, platform] = k.split('|');
                            return `${variant} on ${platform}`;
                        });
                        if (cellNames.length === 1) parts.push(cellNames[0]);
                        else parts.push(`${activeCells.size} jobs`);
                    }
                    notice.style.display = '';
                    notice.textContent = `\u2014 ${visibleCount} of ${totalCount} shown` +
                        (parts.length ? ` (${parts.join(', ')})` : '');
                } else {
                    notice.style.display = 'none';
                }
            }
        }

        let _lastRuntimeKey = 'overall';
        function updateRuntimeForSelection() {
            const activeCells = getActiveCells();
            const panel = document.getElementById('runtime-panel-content');
            if (!panel) return;

            // Build a key to avoid re-rendering when cells haven't changed
            const key = activeCells.size === 0 ? 'overall' : Array.from(activeCells).sort().join(',');
            if (key === _lastRuntimeKey) return;
            _lastRuntimeKey = key;

            if (activeCells.size === 0) {
                if (overallDurations.length > 0) {
                    panel.innerHTML = renderRuntimePanelContent('Overall', overallDurations);
                }
                return;
            }

            let combined = [];
            for (const k of activeCells) {
                if (cellDurationMap[k]) combined.push(...cellDurationMap[k]);
            }

            if (combined.length > 0) {
                let title;
                if (activeCells.size === 1) {
                    const [k] = activeCells;
                    const [variant, platform] = k.split('|');
                    title = `${variant} on ${platform}`;
                } else {
                    title = `${activeCells.size} selected cells`;
                }
                panel.innerHTML = renderRuntimePanelContent(title, combined);
            }
        }

        // Render the full page content
        function renderPage(testPath, testInfo, stats, harness) {
            const testName = testPath.split('/').pop();
            const searchfoxUrl = `https://searchfox.org/mozilla-central/source/${testPath}`;

            // Build date range text
            let dateRangeText = '';
            if (currentData.metadata) {
                const days = currentData.metadata.days || 21;
                const startDate = currentData.metadata.startDate;
                const endDate = currentData.metadata.endDate;
                if (startDate && endDate) {
                    dateRangeText = `${days} days (${startDate} to ${endDate})`;
                }
            }

            let html = '';

            // Header
            html += `<div class="test-header">`;
            html += `<h1>${escapeHtml(testName)}<span class="harness-badge harness-${harness}">${harness}</span></h1>`;
            html += `<div class="test-path-line"><a href="${searchfoxUrl}" target="_blank">${escapeHtml(testPath)}</a>`;
            html += `<button class="copy-btn" onclick="copyTestPath('${escapeAttr(testPath)}')" title="Copy test path">📋 Copy</button>`;
            html += `</div>`;
            if (testInfo.component) {
                html += `<div class="component-line">Bugzilla: ${escapeHtml(testInfo.component)}</div>`;
            }
            html += `</div>`;

            // Status line
            if (dateRangeText) {
                html += `<div class="status-line">${dateRangeText}</div>`;
            }

            // Summary stats
            html += `<div class="summary-stats">`;
            html += renderSummaryStat('Runs', formatNumber(stats.runCount), stats.runCount === 0 ? 'zero' : '');
            html += renderSummaryStat('Pass %', `${stats.passPercentage}%`, stats.passPercentage === 100 ? 'good' : (stats.passPercentage < 90 ? 'fail' : ''));
            html += renderSummaryStat('Failures', formatNumber(stats.failCount), stats.failCount > 0 ? 'fail' : 'zero');
            html += renderSummaryStat('Timeouts', formatNumber(stats.timeoutCount), stats.timeoutCount > 0 ? 'timeout' : 'zero');
            html += renderSummaryStat('Crashes', formatNumber(stats.crashCount), stats.crashCount > 0 ? 'fail' : 'zero');
            html += renderSummaryStat('Skips', formatNumber(stats.skipCount), stats.skipCount > 0 ? 'skip' : 'zero');
            html += `</div>`;

            // Daily rate chart (Chart.js) - only emit canvases that will be used
            const dailyRateData = calculateDailyFailureRates(testInfo.testId);
            const hasIssues = dailyRateData.some(d => d.failures > 0 || d.timeouts > 0 || d.crashes > 0);
            const hasSkips = dailyRateData.some(d => d.skips > 0);
            if (hasIssues || hasSkips) {
                html += `<div class="section">`;
                html += `<h2>Daily Issue Rates</h2>`;
                html += `<div class="historical-chart" id="daily-chart-area">`;
                if (hasIssues) {
                    html += `<div class="chart-wrap"><canvas id="daily-rate-canvas"></canvas></div>`;
                }
                if (hasSkips) {
                    html += `<div class="chart-wrap skips${hasIssues ? ' no-x-axis' : ''}"><canvas id="daily-skips-canvas"></canvas></div>`;
                }
                html += `</div>`;
                html += `</div>`;
            }

            // Job table and runtime stats will be inserted here
            html += `<div id="runtime-sections"></div>`;

            // Issue details section
            html += renderIssueDetails(testPath, testInfo);

            return html;
        }

        function renderSummaryStat(label, value, cssClass) {
            const cls = cssClass ? ` ${cssClass}` : '';
            return `<div class="summary-stat"><span class="summary-stat-value${cls}">${value}</span><span class="summary-stat-label">${label}</span></div>`;
        }

        // Render issue details section
        function renderIssueDetails(testPath, testInfo) {
            const stats = computeTestStats(currentData, testInfo.testId);
            const allIssues = [];

            // Skip messages
            const skipMessages = getSkipMessageCounts(testInfo.testId);
            skipMessages.forEach(({ message, count }) => {
                allIssues.push({ count, type: 'SKIP', message: message.replace(/^skip-if:\s*/, '') });
            });

            // Failure messages
            const failureMessages = getFailureMessageCounts(testInfo.testId);
            let failureMessagesCount = 0;
            failureMessages.forEach(({ message, count }) => {
                allIssues.push({ count, type: 'FAIL', message });
                failureMessagesCount += count;
            });
            if (stats.failCount > failureMessagesCount) {
                allIssues.push({ count: stats.failCount - failureMessagesCount, type: 'FAIL', message: FAILURE_NO_MESSAGE });
            }

            // Crash data
            const crashData = getCrashData(testInfo.testId);
            crashData.signatures.forEach(({ signature, count }) => {
                allIssues.push({ count, type: 'CRASH', message: signature });
            });
            const crashMessagesCount = crashData.signatures.reduce((sum, sig) => sum + sig.count, 0);
            if (stats.crashCount > crashMessagesCount) {
                allIssues.push({ count: stats.crashCount - crashMessagesCount, type: 'CRASH', message: 'Crash signature not recorded' });
            }

            // Timeouts
            if (stats.timeoutCount > 0) {
                allIssues.push({ count: stats.timeoutCount, type: 'TIMEOUT', message: 'Test exceeded time limit' });
            }

            if (allIssues.length === 0) return '';

            allIssues.sort((a, b) => b.count - a.count);
            allIssuesGlobal = allIssues;

            let html = `<div class="section" id="issue-details-section">`;
            html += `<h2>Issue Details<span id="issue-filter-notice" class="issue-filter-notice" style="display: none;"></span></h2>`;
            html += `<div class="issue-section">`;

            allIssues.forEach(({ count, type, message }, index) => {
                const badgeClass = type === 'SKIP' ? 'badge-skip' : type === 'FAIL' ? 'badge-fail' : type === 'CRASH' ? 'badge-crash' : 'badge-timeout';
                const issueId = `issue-${index}`;
                const escapedMessage = message.replace(/"/g, '&quot;');
                const isExpandable = type !== 'SKIP';

                let tooltip = '';
                if (type === 'FAIL' && stats.runCount > 0) {
                    const percentage = ((count / stats.runCount) * 100).toFixed(2);
                    const occurrenceText = count === 1 ? 'occurrence' : 'occurrences';
                    tooltip = `${count} ${occurrenceText} of this message out of ${stats.runCount.toLocaleString()} runs (${percentage}%)`;
                }

                if (isExpandable) {
                    html += `<div class="issue-item" data-issue-index="${index}" data-issue-id="${issueId}" data-test-path="${escapeAttr(testPath)}" data-test-id="${testInfo.testId}" data-issue-type="${type}" data-issue-message="${escapedMessage}" onclick="toggleIssueRuns(this, event)" onmouseenter="hoverIssue(this)" onmouseleave="unhoverIssue()">`;
                } else {
                    html += `<div class="issue-item" data-issue-index="${index}" style="cursor: default;" onmouseenter="hoverIssue(this)" onmouseleave="unhoverIssue()">`;
                }
                html += `<span class="issue-count"${tooltip ? ` title="${escapeAttr(tooltip)}"` : ''}>${count}</span>`;
                html += `<span class="issue-badge ${badgeClass}">${type}</span>`;
                html += `<span class="issue-message">${type === 'FAIL' ? linkifyFailureMessage(message, testPath) : escapeHtml(message)}`;

                // Bug filing button for failures with component
                if (type === 'FAIL' && testInfo.component?.includes(' :: ')) {
                    const { firstDate, lastDate } = getDataDateRange(currentData);
                    const bugUrl = getBugzillaUrl({
                        testPath,
                        summary: message,
                        component: testInfo.component,
                        stats: { failureCount: count, totalRuns: stats.runCount, firstDate, lastDate },
                        addSearchHash: false
                    });
                    html += getBugButton(bugUrl, 'File bug for this failure');
                }

                html += `</span></div>`;
                if (isExpandable) {
                    html += `<div class="historical-chart" id="${issueId}-chart" style="display: none; margin-left: 50px;">`;
                    html += `<canvas id="${issueId}-canvas" class="historical-chart-canvas"></canvas>`;
                    html += `</div>`;
                    html += `<div class="issue-runs" id="${issueId}-runs" style="display: none;"></div>`;
                }
            });

            html += `</div></div>`;
            return html;
        }

        // Calculate per-job-name breakdown from aggregated data
        function calculateJobNameBreakdown(testId) {
            const jobs = {};
            const testGroup = currentData.testRuns[testId];
            if (!testGroup) return jobs;

            const ensureJob = (jobName) => {
                if (!jobs[jobName]) jobs[jobName] = { passes: 0, failures: 0, timeouts: 0, crashes: 0, skips: 0, skipMessages: new Map() };
                return jobs[jobName];
            };

            for (let statusId = 0; statusId < testGroup.length; statusId++) {
                const statusGroup = testGroup[statusId];
                if (!statusGroup) continue;

                const status = currentData.tables.statuses[statusId];
                const isSkip = status === 'SKIP';
                const isCrash = status === 'CRASH';
                const isTimeout = status && status.startsWith('TIMEOUT');
                const isFail = status && !['PASS', 'PASS-PARALLEL', 'PASS-SEQUENTIAL', 'SKIP', 'TIMEOUT', 'TIMEOUT-PARALLEL', 'TIMEOUT-SEQUENTIAL', 'EXPECTED-FAIL', 'OK', 'UNKNOWN'].includes(status);

                const addToJob = (jobName, count) => {
                    const job = ensureJob(jobName);
                    if (isSkip) job.skips += count;
                    else if (isCrash) job.crashes += count;
                    else if (isTimeout) job.timeouts += count;
                    else if (isFail) job.failures += count;
                    else job.passes += count;
                };

                if (statusGroup.jobNameIds && (statusGroup.counts || (statusGroup.durations && statusGroup.days !== undefined))) {
                    // Counts/durations-based format with per-entry jobNameIds (PASS and SKIP)
                    for (let i = 0; i < statusGroup.jobNameIds.length; i++) {
                        if (isSkip) {
                            const messageId = statusGroup.messageIds?.[i];
                            const msg = messageId !== null && messageId !== undefined ? currentData.tables.messages[messageId] : null;
                            if (msg?.startsWith('run-if')) continue;
                        }
                        const jobName = currentData.tables.jobNames[statusGroup.jobNameIds[i]];
                        addToJob(jobName, getCountAtIndex(statusGroup, i));
                        if (isSkip) {
                            const msgId = statusGroup.messageIds?.[i];
                            const msg = msgId !== null && msgId !== undefined ? currentData.tables.messages[msgId] : null;
                            if (msg) {
                                const display = msg.replace(/^skip-if:\s*/, '');
                                const job = ensureJob(jobName);
                                job.skipMessages.set(display, (job.skipMessages.get(display) || 0) + statusGroup.counts[i]);
                            }
                        }
                    }
                } else if (statusGroup.taskIdIds && statusGroup.days !== undefined) {
                    // Bucketed taskIdIds format (FAIL, CRASH, TIMEOUT)
                    for (let i = 0; i < statusGroup.taskIdIds.length; i++) {
                        for (const taskIdIndex of statusGroup.taskIdIds[i]) {
                            const jobName = currentData.tables.jobNames[currentData.taskInfo.jobNameIds[taskIdIndex]];
                            addToJob(jobName, 1);
                        }
                    }
                }
            }
            return jobs;
        }

        // Render the job name breakdown table as a pivot: platforms as columns, job variant as rows
        function renderJobNameTable(testId) {
            const jobs = calculateJobNameBreakdown(testId);

            const jobEntries = Object.entries(jobs);
            if (jobEntries.length === 0) return '';

            // Extract platform and variant from each job name, group by variant
            const variants = {};
            const platformSet = new Set();
            for (const [jobName, counts] of jobEntries) {
                const platform = extractPlatform(jobName) || 'unknown';
                const variant = extractVariant(jobName);
                platformSet.add(platform);
                if (!variants[variant]) variants[variant] = {};
                if (!variants[variant][platform]) {
                    variants[variant][platform] = { passes: 0, failures: 0, timeouts: 0, crashes: 0, skips: 0, skipMessages: new Map() };
                }
                const v = variants[variant][platform];
                v.passes += counts.passes;
                v.failures += counts.failures;
                v.timeouts += counts.timeouts;
                v.crashes += counts.crashes;
                v.skips += counts.skips;
                for (const [msg, cnt] of counts.skipMessages) {
                    v.skipMessages.set(msg, (v.skipMessages.get(msg) || 0) + cnt);
                }
            }

            const platforms = Array.from(platformSet).sort();

            let html = `<div class="section">`;
            let dateInfo = '';
            if (currentData.metadata) {
                if (currentData.metadata.startDate && currentData.metadata.endDate) {
                    dateInfo = `${currentData.metadata.days || 21} days, ${currentData.metadata.startDate} to ${currentData.metadata.endDate}`;
                } else if (currentData.metadata.date) {
                    dateInfo = currentData.metadata.date;
                }
            }
            html += `<h2>Pass/Fail by Job${dateInfo ? ` <span style="font-size: 12px; color: #888; font-weight: normal;">(${dateInfo})</span>` : ''}</h2>`;
            html += `<table class="platform-table job-table">`;
            html += `<thead><tr><th>Job</th>`;
            for (const platform of platforms) {
                html += `<th>${escapeHtml(platform)}</th>`;
            }
            html += `</tr></thead><tbody>`;

            // Sort variants: group by prefix (e.g. opt, debug, asan), sort groups by total runs desc,
            // then sort variants within each group by runs desc
            const variantTotalRuns = (platformData) => Object.values(platformData).reduce(
                (sum, d) => sum + d.passes + d.failures + d.timeouts + d.crashes + d.skips, 0);
            const prefixRuns = {};
            for (const [variant, platformData] of Object.entries(variants)) {
                const prefix = variant.split('-')[0] || variant;
                prefixRuns[prefix] = (prefixRuns[prefix] || 0) + variantTotalRuns(platformData);
            }
            const variantEntries = Object.entries(variants).sort((a, b) => {
                const prefixA = a[0].split('-')[0] || a[0];
                const prefixB = b[0].split('-')[0] || b[0];
                if (prefixA !== prefixB) return (prefixRuns[prefixB] || 0) - (prefixRuns[prefixA] || 0);
                return variantTotalRuns(b[1]) - variantTotalRuns(a[1]);
            });
            for (const [variant, platformData] of variantEntries) {
                html += `<tr><td style="font-family: monospace; font-size: 12px;">${escapeHtml(variant)}</td>`;
                for (const platform of platforms) {
                    const d = platformData[platform];
                    if (!d) {
                        html += `<td class="job-cell"><span class="job-na">\u2014</span></td>`;
                        continue;
                    }
                    const total = d.passes + d.failures + d.timeouts + d.crashes;
                    const issues = d.failures + d.timeouts + d.crashes;

                    html += `<td class="job-cell" data-variant="${escapeAttr(variant)}" data-platform="${escapeAttr(platform)}" onmouseenter="showCellRuntime(this)" onmouseleave="showOverallRuntime()" onclick="handleCellClick(this, event)">`;

                    // Grid stack: overlay layers share the same cell area.
                    // - em-dash layer (display:none): shown for no-run days
                    // - prefix PASS layer (display:none): shown for pass-only days in issue cells
                    // - main badges layer (always present, uses visibility for filtering)
                    html += `<div class="cell-stack">`;
                    html += `<span class="cell-layer job-na" data-type="na" style="display:none">\u2014</span>`;
                    if (issues > 0 && d.passes > 0) {
                        html += `<span class="cell-layer issue-badge badge-pass" data-type="pass" data-prefix="1" style="display:none">PASS</span>`;
                    }

                    html += `<div class="cell-layer badges-layer">`;
                    const lines = [];

                    if (issues > 0) {
                        const tooltipLines = [];
                        if (d.failures > 0) tooltipLines.push(`${d.failures} failure${d.failures !== 1 ? 's' : ''}`);
                        if (d.crashes > 0) tooltipLines.push(`${d.crashes} crash${d.crashes !== 1 ? 'es' : ''}`);
                        if (d.timeouts > 0) tooltipLines.push(`${d.timeouts} timeout${d.timeouts !== 1 ? 's' : ''}`);
                        if (d.passes > 0) tooltipLines.push(`${d.passes} pass${d.passes !== 1 ? 'es' : ''}`);
                        tooltipLines.push(`${total} total runs`);
                        const tooltip = escapeAttr(tooltipLines.join('\n'));

                        if (d.failures > 0) {
                            const pct = ((d.failures / total) * 100).toFixed(1);
                            lines.push(`<span class="issue-badge badge-fail "data-type="fail" title="${tooltip}"><span>FAIL</span><span class="badge-pct">${pct}%</span></span>`);
                        }
                        if (d.crashes > 0) {
                            const pct = ((d.crashes / total) * 100).toFixed(1);
                            lines.push(`<span class="issue-badge badge-crash "data-type="crash" title="${tooltip}"><span>CRASH</span><span class="badge-pct">${pct}%</span></span>`);
                        }
                        if (d.timeouts > 0) {
                            const pct = ((d.timeouts / total) * 100).toFixed(1);
                            lines.push(`<span class="issue-badge badge-timeout "data-type="timeout" title="${tooltip}"><span>TIMEOUT</span><span class="badge-pct">${pct}%</span></span>`);
                        }
                    } else if (total > 0) {
                        lines.push(`<span class="issue-badge badge-pass" data-type="pass" title="${escapeAttr(`${d.passes} run${d.passes !== 1 ? 's' : ''}`)}">PASS</span>`);
                    }

                    if (d.skips > 0) {
                        const skipCount = `${d.skips} skip${d.skips !== 1 ? 's' : ''}`;
                        let skipTooltip;
                        if (d.skipMessages.size === 1) {
                            const [msg] = d.skipMessages.keys();
                            skipTooltip = `${skipCount}\n${msg}`;
                        } else if (d.skipMessages.size > 1) {
                            const msgs = Array.from(d.skipMessages.entries())
                                .sort((a, b) => b[1] - a[1])
                                .map(([msg, cnt]) => `${msg} (${cnt})`)
                                .join('\n');
                            skipTooltip = `${skipCount}\n${msgs}`;
                        } else {
                            skipTooltip = skipCount;
                        }
                        lines.push(`<span class="issue-badge badge-skip" data-type="skip" title="${escapeAttr(skipTooltip)}">SKIP</span>`);
                    }

                    html += lines.join('<br>');
                    html += `</div></div>`;

                    html += `</td>`;
                }
                html += `</tr>`;
            }

            html += `</tbody></table></div>`;
            return html;
        }

        // Main entry point
        async function loadTestData() {
            const urlParams = new URLSearchParams(window.location.search);
            const testPath = urlParams.get('test');

            if (!testPath) {
                const contentEl = document.getElementById('content');
                contentEl.innerHTML = `<div class="test-header">` +
                    `<h1>Test Info</h1>` +
                    `<form action="test.html" method="get" style="margin-top: 12px;">` +
                    `<label for="test-input" style="font-size: 14px; color: #555;">Enter test path:</label>` +
                    `<div style="display: flex; gap: 8px; margin-top: 6px;">` +
                    `<input id="test-input" name="test" type="text" placeholder="e.g. browser/components/.../browser_foo.js" ` +
                    `style="flex: 1; padding: 8px 10px; font-family: monospace; font-size: 13px; border: 1px solid #ccc; border-radius: 4px;">` +
                    `<button type="submit" style="padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;">Go</button>` +
                    `</div></form></div>`;
                contentEl.style.display = 'block';
                document.getElementById('test-input').focus();
                return;
            }

            const harness = detectHarness(testPath);
            const testName = testPath.split('/').pop();
            document.title = `${testName} - Test Info`;

            // Show header immediately before fetching data
            const contentEl = document.getElementById('content');
            const searchfoxUrl = `https://searchfox.org/mozilla-central/source/${testPath}`;
            const placeholder = '\u00a0';
            contentEl.innerHTML = `<div class="test-header">` +
                `<h1>${escapeHtml(testName)}<span class="harness-badge harness-${harness}">${harness}</span></h1>` +
                `<div class="test-path-line"><a href="${searchfoxUrl}" target="_blank">${escapeHtml(testPath)}</a>` +
                `<button class="copy-btn" onclick="copyTestPath('${escapeAttr(testPath)}')" title="Copy test path">📋 Copy</button>` +
                `</div>` +
                `<div class="component-line">Bugzilla: <span id="component-value">...</span></div>` +
                `</div>` +
                `<div class="status-line" id="status-line">Loading ${harness} data...</div>` +
                `<div class="summary-stats">` +
                renderSummaryStat('Runs', placeholder, '') +
                renderSummaryStat('Pass %', placeholder, '') +
                renderSummaryStat('Failures', placeholder, '') +
                renderSummaryStat('Timeouts', placeholder, '') +
                renderSummaryStat('Crashes', placeholder, '') +
                renderSummaryStat('Skips', placeholder, '') +
                `</div>`;
            contentEl.style.display = 'block';

            const chunkHex = getChunkIndex(testPath).toString(16).padStart(2, '0');

            try {
                // Load chunk file for this test
                const dataFile = `${harness}-${chunkHex}.json`;

                let response = await fetchData(dataFile);
                let data = null;
                let testInfo = null;
                let usedHarness = harness;

                if (response.ok) {
                    data = await response.json();
                    currentData = data;
                    testInfo = findTest(data, testPath);
                }

                // If not found, try the other harness with same chunk index
                if (!testInfo) {
                    const otherHarness = harness === 'xpcshell' ? 'mochitest' : 'xpcshell';
                    const otherFile = `${otherHarness}-${chunkHex}.json`;
                    document.getElementById('status-line').textContent = `Not found in ${harness}, trying ${otherHarness}...`;

                    response = await fetchData(otherFile);
                    if (response.ok) {
                        data = await response.json();
                        currentData = data;
                        testInfo = findTest(data, testPath);
                        if (testInfo) {
                            usedHarness = otherHarness;
                        }
                    }
                }

                if (!testInfo) {
                    document.getElementById('status-line').textContent = `Test not found: ${testPath}. It may not have been run in the last 21 days, or the path may be incorrect.`;
                    document.getElementById('status-line').style.color = '#dc3545';
                    return;
                }

                // Compute stats
                const stats = computeTestStats(currentData, testInfo.testId);

                // Set favicon based on test health
                setFavicon(stats.passPercentage === 100 ? '#4caf50' : '#ff9500');

                // Render page (replaces the initial header)
                contentEl.innerHTML = renderPage(testPath, testInfo, stats, usedHarness);

                // Build cross-component data structures
                testIdGlobal = testInfo.testId;
                dayJobMatrix = buildDayJobMatrix(testInfo.testId);
                if (allIssuesGlobal) {
                    issueFilterData = buildIssueFilterData(testInfo.testId, allIssuesGlobal);
                }

                // Insert job table and runtime panel side by side
                const runtimeSections = document.getElementById('runtime-sections');
                if (runtimeSections) {
                    const jobTableHtml = renderJobNameTable(testInfo.testId);
                    const { allDurations, perJobDurations } = collectAllDurations(testInfo.testId);

                    if (allDurations.length > 0 && jobTableHtml) {
                        cellDurationMap = buildCellDurationMap(perJobDurations);
                        overallDurations = allDurations;
                        let dMin = Infinity, dMax = -Infinity;
                        for (const d of allDurations) {
                            if (d < dMin) dMin = d;
                            if (d > dMax) dMax = d;
                        }
                        overallDurationRange = { min: dMin, max: dMax };
                        overallHistogramBins = computeHistogramBins(allDurations, 20, dMin, dMax);
                        const panelHtml = renderRuntimePanel(allDurations);
                        runtimeSections.innerHTML = `<div class="runtime-layout">${jobTableHtml}${panelHtml}</div>`;
                    } else {
                        runtimeSections.innerHTML = jobTableHtml;
                    }
                }

                // Measure worst-case percentage width and lock min-width on .badge-pct spans
                const measureEl = document.createElement('span');
                measureEl.className = 'badge-pct';
                measureEl.style.cssText = 'position:absolute;visibility:hidden;font-size:10px;font-weight:bold;font-variant-numeric:tabular-nums;display:inline-block;text-align:right;';
                document.body.appendChild(measureEl);
                measureEl.textContent = '100.0%';
                const pctMinWidth = measureEl.offsetWidth + 'px';
                document.body.removeChild(measureEl);

                // Lock issue details section height to prevent scroll jumps when filtering
                const issueSection = document.getElementById('issue-details-section');
                if (issueSection) {
                    issueSection.style.minHeight = issueSection.offsetHeight + 'px';
                }

                // Store original cell content and apply min-widths for table filtering
                document.querySelectorAll('.job-cell[data-variant]').forEach(cell => {
                    cell.querySelectorAll('.badge-pct').forEach(span => {
                        span.style.minWidth = pctMinWidth;
                    });
                    // Suppress hover on pass-only cells
                    if (!cell.querySelector('.badges-layer [data-type="fail"], .badges-layer [data-type="crash"], .badges-layer [data-type="timeout"], .badges-layer [data-type="skip"]')) {
                        cell.classList.add('no-hover');
                    }
                    originalCellContent.set(cell, cell.innerHTML);
                });

                // Load Chart.js for daily rate charts (canvases already rendered with correct layout)
                if (document.getElementById('daily-rate-canvas') || document.getElementById('daily-skips-canvas')) {
                    dailyRateDataGlobal = calculateDailyFailureRates(testInfo.testId);
                    const dailyRateData = dailyRateDataGlobal;
                    const chartScript = document.createElement('script');
                    chartScript.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
                    chartScript.async = true;
                    chartScript.onload = function() {
                        // Register global plugin for day column highlighting
                        Chart.register({
                            id: 'dayColumnHighlight',
                            beforeDatasetsDraw(chart) {
                                const hovered = chart._hoveredDay;
                                const clicked = chart._clickedDays;
                                if (hovered === null && !clicked) return;

                                const ctx = chart.ctx;
                                const xScale = chart.scales.x;
                                const chartArea = chart.chartArea;
                                const barWidth = xScale.width / xScale.ticks.length;

                                ctx.save();
                                // Draw clicked day backgrounds (selected blue)
                                if (clicked) {
                                    ctx.fillStyle = '#d0e4fd';
                                    for (const dayIdx of clicked) {
                                        const x = xScale.getPixelForValue(dayIdx);
                                        ctx.fillRect(x - barWidth / 2, chartArea.top,
                                                     barWidth, chartArea.bottom - chartArea.top);
                                    }
                                }
                                // Draw hovered day background (hover blue)
                                if (hovered !== null && (!clicked || !clicked.has(hovered))) {
                                    ctx.fillStyle = '#e8f0fe';
                                    const x = xScale.getPixelForValue(hovered);
                                    ctx.fillRect(x - barWidth / 2, chartArea.top,
                                                 barWidth, chartArea.bottom - chartArea.top);
                                }
                                ctx.restore();
                            }
                        });
                        createFailureRateChart('daily-rate-canvas', dailyRateData);
                    };
                    document.head.appendChild(chartScript);
                }

            } catch (error) {
                console.error('Error loading test data:', error);
                const statusLine = document.getElementById('status-line');
                if (statusLine) {
                    statusLine.textContent = `Error loading data: ${error.message}`;
                    statusLine.style.color = '#dc3545';
                } else {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').textContent = `Error loading data: ${error.message}`;
                }
            }
        }

        // Start loading when page is ready
        loadTestData();
    </script>
</body>
</html>
