<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worker Pool Activity</title>
<link rel="stylesheet" href="shared.css">
<style>
.summary {
  background: white;
  padding: 15px 20px;
  border-radius: 8px;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
  margin-bottom: 15px;
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
}
.summary-stat {
  display: flex;
  flex-direction: column;
}
.summary-stat .value {
  font-size: 22px;
  font-weight: bold;
  color: #333;
}
.summary-stat .label {
  font-size: 11px;
  text-transform: uppercase;
  color: #888;
  margin-top: 2px;
}
.controls {
  display: flex;
  align-items: center;
  gap: 15px;
  flex-wrap: wrap;
  min-height: 34px;
}
.filter-wrap {
  position: relative;
  display: inline-block;
}
#filter {
  padding: 4px 28px 4px 12px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 14px;
  width: 300px;
}
.filter-clear {
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  border: none;
  background: none;
  color: #999;
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
}
.filter-clear:hover {
  color: #333;
}
#project-filters button {
  padding: 5px 12px;
  font-size: 12px;
}
.pool-table-wrapper {
  background: white;
  border-radius: 8px;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
  overflow-x: clip;
}
.pool-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.pool-table th {
  text-align: left;
  padding: 8px 12px;
  background: #f8f9fa;
  border-bottom: 2px solid #ddd;
  font-size: 11px;
  text-transform: uppercase;
  color: #666;
  position: sticky;
  top: 0;
  z-index: 1;
  white-space: nowrap;
}
.pool-table th.num {
  text-align: right;
}
.pool-table td {
  padding: 6px 12px;
  border-bottom: 1px solid #eee;
  vertical-align: middle;
}
.pool-table td.num {
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.pool-table td.pool-name {
  max-width: 350px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: monospace;
  font-size: 12px;
}
.pool-table tr:hover {
  background: #fafafa;
}
.pool-table tr.all-tasks-row {
  font-weight: bold;
  background: #f0f4ff;
}
.pool-table tr.all-tasks-row:hover {
  background: #e8eeff;
}
.pool-table tr.all-tasks-row td {
  border-bottom: 2px solid #ddd;
}
.track-cell {
  padding: 0 0 0 8px !important;
  width: 100%;
  min-width: 400px;
}
.track-container {
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
}
.track-canvas {
  display: block;
  flex: 1;
  width: 0;
  min-width: 0;
  height: 36px;
  cursor: crosshair;
}
.track-tooltip {
  position: absolute;
  top: -28px;
  padding: 2px 6px;
  background: rgba(0,0,0,.8);
  color: white;
  font-size: 11px;
  border-radius: 3px;
  pointer-events: none;
  white-space: nowrap;
  display: none;
  z-index: 10;
}
.profiler-btn {
  flex-shrink: 0;
  margin-right: 6px;
  padding: 3px 8px;
  background: #0060df;
  color: white;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  white-space: nowrap;
}
.profiler-btn:hover {
  background: #003eaa;
}
.profiler-btn:disabled {
  cursor: wait;
}
.profiler-btn:hover {
  background: #003eaa;
}
th.sortable {
  cursor: pointer;
  user-select: none;
}
th.sortable:hover {
  background: #eef;
}
th.sortable::after {
  content: ' \2195';
  opacity: 0.3;
}
th.sortable.sort-asc::after {
  content: ' \2191';
  opacity: 1;
}
th.sortable.sort-desc::after {
  content: ' \2193';
  opacity: 1;
}
.qt-grey { color: #999; }
.qt-yellow { color: #a68a00; }
.qt-orange { color: #d96c00; font-weight: bold; }
.qt-red { color: #d00; font-weight: bold; }
</style>
</head>
<body>
<h1>Worker Pool Activity</h1>
<div id="error" class="error" style="display:none"></div>
<div id="content">
  <div id="summary" class="summary">
    <div class="summary-stat"><span id="summary-date" class="value">&mdash;</span><span class="label">UTC</span></div>
    <div class="summary-stat"><span class="value">&mdash;</span><span class="label">Worker Pools</span></div>
    <div class="summary-stat"><span class="value">&mdash;</span><span class="label">Total Jobs</span></div>
  </div>
  <div class="controls">
    <span id="loading" class="loading" style="font-size:13px;padding:0;color:#888">Loading task data...</span>
    <select id="date-select" style="display:none"></select>
    <span class="filter-wrap" style="display:none">
      <input type="text" id="filter" placeholder="Filter worker pools...">
      <button type="button" id="filter-clear" class="filter-clear" hidden>&times;</button>
    </span>
    <span id="project-filters" class="btn-group" style="display:none"></span>
  </div>
  <div class="pool-table-wrapper" style="display:none">
    <table class="pool-table">
      <thead>
        <tr>
          <th class="sortable" data-sort="name">Worker Pool</th>
          <th class="num sortable" data-sort="totalJobs">Jobs</th>
          <th class="num sortable" data-sort="maxRunning">Peak<br>Running</th>
          <th class="num sortable" data-sort="maxQueued">Peak<br>Queued</th>
          <th class="num sortable" data-sort="minQueueTime">Queue Time<br>Min</th>
          <th class="num sortable" data-sort="medianQueueTime">Queue Time<br>Median</th>
          <th class="num sortable" data-sort="p90QueueTime">Queue Time<br>p90</th>
          <th class="num sortable" data-sort="maxQueueTime">Queue Time<br>Max</th>
          <th>Activity</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>
<script src="fetch-utils.js"></script>
<script>

// ==================== Formatting ====================

function formatDuration(ms) {
  if (ms == null) return '\u2014';
  if (ms < 0) ms = 0;

  const totalSeconds = ms / 1000;
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;

  const pad = (n) => String(n).padStart(2, '0');

  if (h > 0) {
    // H:mm:ss
    return h + ':' + pad(m) + ':' + pad(Math.floor(s));
  }
  if (m > 0) {
    // m:ss
    return m + ':' + pad(Math.floor(s));
  }
  // s.fs
  return s.toFixed(1) + 's';
}

function durationColorClass(ms) {
  if (ms == null) return '';
  if (ms >= 10 * 3600000) return 'qt-red';      // >= 10 hours
  if (ms >= 3600000)       return 'qt-orange';   // >= 1 hour
  if (ms >= 300000)        return 'qt-yellow';   // >= 5 minutes
  if (ms < 60000)          return 'qt-grey';     // < 1 minute
  return '';
}

function formatNumber(n) {
  return n.toLocaleString();
}

function jobsByProject(tasks) {
  const counts = new Map();
  for (const t of tasks) {
    const proj = t.project || 'unknown';
    counts.set(proj, (counts.get(proj) || 0) + 1);
  }
  return [...counts.entries()]
    .sort((a, b) => b[1] - a[1])
    .map(([proj, count]) => proj + ': ' + formatNumber(count))
    .join('\n');
}

// ==================== Data Decoding ====================

function decompressScheduled(scheduled, n) {
  const abs = new Array(n);
  if (n > 0) {
    abs[0] = scheduled[0];
    for (let i = 1; i < n; i++) {
      abs[i] = abs[i - 1] + scheduled[i];
    }
  }
  return abs;
}

function parseResolution(resolution) {
  const dashIdx = resolution.indexOf(' - ');
  if (dashIdx >= 0) {
    return { state: resolution.substring(0, dashIdx), reason: resolution.substring(dashIdx + 3) };
  }
  return { state: resolution, reason: resolution };
}

function decodeSummaryData(data) {
  const { tables, tasks, metadata } = data;
  const n = metadata.taskCount;
  const absScheduled = decompressScheduled(tasks.scheduled, n);
  const rows = new Array(n);
  for (let i = 0; i < n; i++) {
    const s = absScheduled[i];
    const { state, reason } = parseResolution(tables.resolutions[tasks.resolutionIds[i]] || '');
    rows[i] = {
      scheduled: s,
      started: tasks.started[i] !== null ? s + tasks.started[i] : null,
      resolved: s + tasks.resolved[i],
      task_queue_id: tables.taskQueueIds[tasks.taskQueueIdIds[i]] || 'unknown',
      project: tasks.projectIds[i] !== null ? tables.projects[tasks.projectIds[i]] : 'unknown',
      state,
      reason_resolved: reason,
    };
  }
  return rows;
}

function decodeTaskData(data) {
  const { tables, tasks, workerInfo, taskGroupInfo, metadata } = data;
  const n = metadata.taskCount;
  const absScheduled = decompressScheduled(tasks.scheduled, n);
  const rows = new Array(n);
  for (let i = 0; i < n; i++) {
    const s = absScheduled[i];
    const { state, reason } = parseResolution(tables.resolutions[tasks.resolutionIds[i]] || '');
    const taskIdStr = tasks.taskIds[i] || '';
    const dotIdx = taskIdStr.lastIndexOf('.');
    let task_id = taskIdStr, run_id = '0';
    if (dotIdx > 0) {
      const suffix = taskIdStr.substring(dotIdx + 1);
      if (/^\d+$/.test(suffix)) {
        task_id = taskIdStr.substring(0, dotIdx);
        run_id = suffix;
      }
    }
    const wIdx = tasks.workerIdIds[i];
    const tgIdx = tasks.taskGroupIdIds[i];
    const projIdx = tgIdx !== null ? taskGroupInfo.projectIds[tgIdx] : null;
    rows[i] = {
      scheduled: s,
      started: tasks.started[i] !== null ? s + tasks.started[i] : null,
      resolved: s + tasks.resolved[i],
      task_queue_id: tables.taskQueueIds[tasks.taskQueueIdIds[i]] || 'unknown',
      project: projIdx !== null ? tables.projects[projIdx] : 'unknown',
      state,
      reason_resolved: reason,
      task_id,
      run_id,
      label: tasks.labelIds[i] !== null ? tables.labels[tasks.labelIds[i]] : '',
      priority: tasks.priorityIds[i] !== null ? tables.priorities[tasks.priorityIds[i]] : '',
      task_group_id: tgIdx !== null ? tables.taskGroupIds[tgIdx] : '',
      created_for_user: tasks.userIds[i] !== null ? tables.users[tasks.userIds[i]] : '',
      worker_group: wIdx !== null && workerInfo.workerGroupIds[wIdx] !== null
        ? tables.workerGroups[workerInfo.workerGroupIds[wIdx]] : '',
      worker_id: wIdx !== null ? tables.workerIds[wIdx] : '',
      run_cost: tasks.runCosts[i] || 0,
    };
  }
  return rows;
}

// ==================== Stats Computation ====================

function computeStats(tasks) {
  const events = [];
  const queueTimes = [];

  for (const t of tasks) {
    events.push({ time: t._scheduledMs, type: 0 }); // schedule
    if (t._startedMs) {
      events.push({ time: t._startedMs, type: 1 }); // start
      events.push({ time: t._resolvedMs, type: 3 }); // resolve (started)
      queueTimes.push(t._startedMs - t._scheduledMs);
    } else {
      events.push({ time: t._resolvedMs, type: 2 }); // resolve (unstarted)
    }
  }

  events.sort((a, b) => a.time - b.time || a.type - b.type);

  let queued = 0, running = 0, maxQueued = 0, maxRunning = 0;
  for (const e of events) {
    switch (e.type) {
      case 0: queued++; break;
      case 1: queued--; running++; break;
      case 2: queued--; break;
      case 3: running--; break;
    }
    if (queued > maxQueued) maxQueued = queued;
    if (running > maxRunning) maxRunning = running;
  }

  queueTimes.sort((a, b) => a - b);
  const n = queueTimes.length;

  const expiredCount = tasks.filter(t => t._expired).length;

  return {
    totalJobs: tasks.length,
    expiredCount,
    maxRunning,
    maxQueued,
    minQueueTime: n ? queueTimes[0] : null,
    maxQueueTime: n ? queueTimes[n - 1] : null,
    medianQueueTime: n ? queueTimes[Math.floor(n / 2)] : null,
    p90QueueTime: n ? queueTimes[Math.floor(n * 0.9)] : null,
  };
}

// ==================== Time Series for Track Drawing ====================

function buildTimeSeries(tasks) {
  const events = [];
  for (const t of tasks) {
    events.push({ time: t._scheduledMs, dTotal: 1, dRunning: 0, dExpired: t._expired ? 1 : 0 });
    if (t._startedMs) {
      events.push({ time: t._startedMs, dTotal: 0, dRunning: 1, dExpired: 0 });
      events.push({ time: t._resolvedMs, dTotal: -1, dRunning: -1, dExpired: 0 });
    } else {
      events.push({ time: t._resolvedMs, dTotal: -1, dRunning: 0, dExpired: t._expired ? -1 : 0 });
    }
  }
  events.sort((a, b) => a.time - b.time);

  const series = [];
  let total = 0, running = 0, expired = 0;
  for (const e of events) {
    total += e.dTotal;
    running += e.dRunning;
    expired += e.dExpired;
    series.push({ time: e.time, total, running, expired });
  }
  return series;
}

// ==================== Track Drawing ====================

function drawTrack(canvas, timeSeries, globalStart, globalEnd, cssW, cssH) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const duration = globalEnd - globalStart;
  if (duration <= 0 || timeSeries.length === 0) {
    ctx.fillStyle = '#f8f9fa';
    ctx.fillRect(0, 0, cssW, cssH);
    return;
  }

  // Sample per CSS pixel — track max values within each pixel bucket
  const totalByPx = new Float32Array(cssW);
  const runningByPx = new Float32Array(cssW);
  const expiredByPx = new Float32Array(cssW);

  let curTotal = 0, curRunning = 0, curExpired = 0, idx = 0;

  // Consume events before the visible range to get initial counts
  while (idx < timeSeries.length && timeSeries[idx].time < globalStart) {
    curTotal = timeSeries[idx].total;
    curRunning = timeSeries[idx].running;
    curExpired = timeSeries[idx].expired;
    idx++;
  }

  for (let px = 0; px < cssW; px++) {
    const pxEndTime = globalStart + ((px + 1) / cssW) * duration;
    let maxTotal = curTotal, maxRunning = curRunning, maxExpired = curExpired;
    while (idx < timeSeries.length && timeSeries[idx].time <= pxEndTime) {
      curTotal = timeSeries[idx].total;
      curRunning = timeSeries[idx].running;
      curExpired = timeSeries[idx].expired;
      if (curTotal > maxTotal) maxTotal = curTotal;
      if (curRunning > maxRunning) maxRunning = curRunning;
      if (curExpired > maxExpired) maxExpired = curExpired;
      idx++;
    }
    totalByPx[px] = maxTotal;
    runningByPx[px] = maxRunning;
    expiredByPx[px] = maxExpired;
  }

  // Find max for Y scaling
  let maxVal = 1;
  for (let px = 0; px < cssW; px++) {
    if (totalByPx[px] > maxVal) maxVal = totalByPx[px];
  }

  // Background
  ctx.fillStyle = '#f8f9fa';
  ctx.fillRect(0, 0, cssW, cssH);

  // Total area (light grey-blue = queued + running)
  ctx.fillStyle = 'rgba(180, 180, 180, 0.3)';
  for (let px = 0; px < cssW; px++) {
    const h = (totalByPx[px] / maxVal) * (cssH - 1);
    if (h > 0) ctx.fillRect(px, cssH - h, 1, h);
  }

  // Running area (blue)
  ctx.fillStyle = 'rgba(0, 96, 223, 0.6)';
  for (let px = 0; px < cssW; px++) {
    const h = (runningByPx[px] / maxVal) * (cssH - 1);
    if (h > 0) ctx.fillRect(px, cssH - h, 1, h);
  }

  // Expired area (purple) — top portion of the grey (queued) area
  ctx.fillStyle = 'rgba(128, 0, 128, 0.5)';
  for (let px = 0; px < cssW; px++) {
    const totalH = (totalByPx[px] / maxVal) * (cssH - 1);
    const expH = (expiredByPx[px] / maxVal) * (cssH - 1);
    if (expH > 0) ctx.fillRect(px, cssH - totalH, 1, expH);
  }

  // Border
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(0, 0, cssW, cssH);
}

// ==================== Profile Generation ====================

function generateProfile(tasks, threadName, timeSeries) {
  const stringArray = ['(root)'];
  const stringIndexMap = new Map([['(root)', 0]]);
  function getStringIndex(str) {
    if (!str) str = '';
    if (stringIndexMap.has(str)) return stringIndexMap.get(str);
    const idx = stringArray.length;
    stringArray.push(str);
    stringIndexMap.set(str, idx);
    return idx;
  }

  // Use the fixed 24h window
  const earliestTime = globalTimeStart;
  const latestTime = globalTimeEnd;

  const markerSchema = [
    {
      name: 'Task',
      tooltipLabel: '{marker.data.label}',
      tableLabel: '{marker.data.state} \u2014 {marker.data.label} \u2014 {marker.data.id}',
      chartLabel: '{marker.data.label}',
      display: ['marker-chart', 'marker-table'],
      colorField: 'color',
      fields: [
        { key: 'id', label: 'Task ID', format: 'unique-string' },
        { key: 'run', label: 'Run ID', format: 'integer' },
        { key: 'label', label: 'Label', format: 'unique-string' },
        { key: 'priority', label: 'Priority', format: 'unique-string' },
        { key: 'state', label: 'State', format: 'unique-string' },
        { key: 'reason', label: 'Reason Resolved', format: 'unique-string' },
        { key: 'group', label: 'Task Group ID', format: 'unique-string' },
        { key: 'proj', label: 'Project', format: 'unique-string' },
        { key: 'user', label: 'User', format: 'unique-string' },
        { key: 'wgrp', label: 'Worker Group', format: 'unique-string' },
        { key: 'wid', label: 'Worker ID', format: 'unique-string' },
        { key: 'qtime', label: 'Queue Time', format: 'duration' },
        { key: 'rtime', label: 'Run Time', format: 'duration' },
        { key: 'cost', label: 'Run Cost', format: 'decimal' },
        { key: 'color', format: 'string', hidden: true },
      ]
    },
    {
      name: 'TaskCount',
      tooltipLabel: '{marker.name}',
      display: [],
      fields: [
        { key: 'total', label: 'Total Tasks', format: 'integer' },
        { key: 'running', label: 'Running Tasks', format: 'integer' },
        { key: 'queued', label: 'Queued Tasks', format: 'integer' },
        { key: 'expired', label: 'Queued Until Expiration', format: 'integer' },
      ],
      graphs: [
        // Drawn back-to-front: purple (total), grey (total-expired), blue (running)
        // Visible bands: blue at bottom, grey in middle, purple at top
        { key: 'total', color: 'purple', type: 'bar' },
        { key: 'nonExpired', color: 'grey', type: 'bar' },
        { key: 'running', color: 'blue', type: 'bar' },
      ]
    }
  ];

  function createMarkers(taskList) {
    const markers = {
      data: [], name: [], startTime: [], endTime: [],
      phase: [], category: [], length: 0
    };

    // TaskCount markers — reuse the already-sorted timeSeries from the dashboard
    const countNameIdx = getStringIndex('TaskCount');
    for (let i = 0; i < timeSeries.length; i++) {
      const m = timeSeries[i];
      if (m.time < earliestTime) continue;
      const next = timeSeries[i + 1];
      markers.name.push(countNameIdx);
      markers.startTime.push(m.time - earliestTime);
      markers.endTime.push(next ? next.time - earliestTime : latestTime - earliestTime);
      markers.phase.push(1);
      markers.category.push(0);
      const queued = m.total - m.running;
      markers.data.push({ type: 'TaskCount', total: m.total, running: m.running, queued, expired: m.expired, nonExpired: m.total - m.expired });
      markers.length++;
    }

    // Task markers — skip tasks entirely outside the 24h window
    const taskNameIdx = getStringIndex('Task');
    for (const t of taskList) {
      // Determine the visible range of this task
      let markerStart, markerEnd;
      if (t._startedMs) {
        markerStart = t._startedMs;
        markerEnd = t._resolvedMs;
      } else if (t._expired) {
        markerStart = t._scheduledMs;
        markerEnd = t._resolvedMs;
      } else {
        markerStart = t._resolvedMs;
        markerEnd = t._resolvedMs;
      }
      // Skip if entirely outside the 24h window
      if (markerEnd < earliestTime || markerStart > latestTime) continue;

      const d = { type: 'Task' };
      d.id = getStringIndex(t.task_id);
      d.run = parseInt(t.run_id) || 0;
      d.label = getStringIndex(t.label || 'unknown');
      if (t.priority) d.priority = getStringIndex(t.priority);
      d.state = getStringIndex(t.state);
      if (t.reason_resolved && t.reason_resolved !== t.state)
        d.reason = getStringIndex(t.reason_resolved);
      if (t.task_group_id) d.group = getStringIndex(t.task_group_id);
      if (t.project) d.proj = getStringIndex(t.project);
      if (t.created_for_user) d.user = getStringIndex(t.created_for_user);
      if (t.worker_group) d.wgrp = getStringIndex(t.worker_group);
      if (t.worker_id) d.wid = getStringIndex(t.worker_id);
      if (t.run_cost) d.cost = parseFloat(t.run_cost);

      if (t.state === 'completed') d.color = 'green';
      else if (t.state === 'failed') d.color = 'red';
      else if (t.state === 'exception' && (t.reason_resolved === 'canceled' || t.reason_resolved === 'deadline-exceeded')) d.color = 'purple';

      if (t._startedMs) {
        d.qtime = t._startedMs - t._scheduledMs;
        d.rtime = t._resolvedMs - t._startedMs;
      } else if (t._expired) {
        d.qtime = t._resolvedMs - t._scheduledMs;
      }

      markers.name.push(taskNameIdx);
      if (t._startedMs) {
        markers.startTime.push(t._startedMs - earliestTime);
        markers.endTime.push(t._resolvedMs - earliestTime);
        markers.phase.push(1);
      } else if (t._expired) {
        markers.startTime.push(t._scheduledMs - earliestTime);
        markers.endTime.push(t._resolvedMs - earliestTime);
        markers.phase.push(1);
      } else {
        markers.startTime.push(t._resolvedMs - earliestTime);
        markers.endTime.push(null);
        markers.phase.push(0);
      }
      markers.category.push(0);
      markers.data.push(d);
      markers.length++;
    }

    return markers;
  }

  const emptyTable = (len) => ({
    frame: Array.from({length: len}, () => 0),
    prefix: Array.from({length: len}, () => null),
    category: Array.from({length: len}, () => 0),
    subcategory: Array.from({length: len}, () => 0),
    length: len
  });

  function makeThread(name, pid, tid, taskList) {
    return {
      processType: 'default',
      processName: name,
      processStartupTime: 0,
      processShutdownTime: null,
      registerTime: 0,
      unregisterTime: null,
      pausedRanges: [],
      showMarkersInTimeline: true,
      name,
      isMainThread: false,
      pid: String(pid),
      tid,
      samples: { weightType: 'samples', weight: null, stack: [], time: [], length: 0 },
      markers: createMarkers(taskList),
      stackTable: emptyTable(1),
      frameTable: {
        address: [-1], inlineDepth: [0], category: [null], subcategory: [0],
        func: [0], nativeSymbol: [null], innerWindowID: [0],
        implementation: [null], line: [null], column: [null], length: 1
      },
      funcTable: {
        isJS: [false], relevantForJS: [false], name: [0], resource: [-1],
        fileName: [null], lineNumber: [null], columnNumber: [null], length: 1
      },
      resourceTable: { lib: [], name: [], host: [], type: [], length: 0 },
      nativeSymbols: { libIndex: [], address: [], name: [], functionSize: [], length: 0 },
    };
  }

  const threads = [makeThread(threadName || 'All Tasks', '0', 0, tasks)];

  return {
    meta: {
      processType: 0,
      product: 'Taskcluster tasks',
      stackwalk: 0,
      version: 32,
      preprocessedProfileVersion: 56,
      symbolicationNotSupported: true,
      interval: 1,
      startTime: earliestTime,
      profilingStartTime: 0,
      profilingEndTime: latestTime - earliestTime,
      categories: [{ name: 'Other', color: 'grey', subcategories: ['Other'] }],
      markerSchema,
      usesOnlyOneStackType: true,
    },
    libs: [],
    threads,
    counters: [],
    shared: { stringArray },
  };
}

// ==================== Profiler Integration ====================

async function openInProfiler(tasks, name, timeSeries) {
  const profile = generateProfile(tasks, name, timeSeries);

  const origin = 'https://profiler.firefox.com';
  const profilerWindow = window.open(origin + '/from-post-message/', '_blank');

  if (!profilerWindow) {
    alert('Popup blocked \u2014 please allow popups for this site.');
    return;
  }

  // Wait for the profiler to signal it's ready, polling with "ready:request".
  await new Promise((resolve) => {
    function onMessage(e) {
      if (e.source === profilerWindow && e.data && e.data.name === 'ready:response') {
        window.removeEventListener('message', onMessage);
        profilerWindow.postMessage({ name: 'inject-profile', profile }, origin);
        resolve();
      }
    }
    window.addEventListener('message', onMessage);
    const poll = setInterval(() => {
      profilerWindow.postMessage({ name: 'ready:request' }, origin);
    }, 100);
    // Stop polling once resolved
    resolve = ((orig) => () => { clearInterval(poll); orig(); })(resolve);
  });
}

// ==================== Rendering ====================

let allRows = []; // { tr, name } for filtering
let currentSort = { key: 'totalJobs', desc: true };
let currentProject = ''; // '' = all projects
let allParsedRows = null; // all rows after timestamp parsing
let globalTimeStart = 0, globalTimeEnd = 0;
let renderContext = null; // { allPool, pools, globalStart, globalEnd }
let availableDates = [];
let currentDate = '';
let fullTaskDataPromise = null;
let controlsInitialized = false;

function ensureFullTaskData() {
  if (!fullTaskDataPromise) {
    fullTaskDataPromise = (async () => {
      const r = await fetchFromCI('worker-data', 'workers-' + currentDate + '-tasks.json');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      const rows = decodeTaskData(data);
      for (const row of rows) {
        row._scheduledMs = Number(row.scheduled);
        row._startedMs = row.started ? Number(row.started) : null;
        row._resolvedMs = Number(row.resolved);
        row._expired = row.state === 'exception' && row.reason_resolved === 'deadline-exceeded';
      }
      return rows.filter(r => {
        if (r._startedMs) return true;
        if (r._expired) return r._scheduledMs !== r._resolvedMs;
        if (r.reason_resolved === 'canceled') return false;
        return true;
      });
    })();
  }
  return fullTaskDataPromise;
}

async function getProfilerTasks(pool) {
  // If pool tasks already have full data (from local file or tasks file), use directly
  if (pool.tasks.length && pool.tasks[0].task_id !== undefined) {
    return pool.tasks;
  }
  // Lazy-load full task data from CI
  const allFullRows = await ensureFullTaskData();
  let rows;
  if (!currentProject) {
    rows = allFullRows;
  } else if (currentProject === '_other') {
    rows = allFullRows.filter(r => !topProjectSet.has(r.project || 'unknown'));
  } else {
    rows = allFullRows.filter(r => r.project === currentProject);
  }
  if (pool.name === 'All Tasks') return rows;
  return rows.filter(r => (r.task_queue_id || 'unknown') === pool.name);
}

async function switchDate(date) {
  const loadingEl = document.getElementById('loading');
  document.querySelector('.pool-table-wrapper').style.display = 'none';
  document.querySelector('.filter-wrap').style.display = 'none';
  document.getElementById('project-filters').style.display = 'none';
  loadingEl.style.display = '';
  loadingEl.textContent = 'Fetching data for ' + date + '...';
  try {
    const response = await fetchFromCI('worker-data', 'workers-' + date + '.json');
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const data = await response.json();
    const rows = decodeSummaryData(data);
    currentDate = date;
    fullTaskDataPromise = null;
    const url = new URL(location);
    url.searchParams.set('date', date);
    history.replaceState(null, '', url);
    const dayStartMs = Date.parse(date + 'T00:00:00Z');
    processData(rows, dayStartMs);
  } catch (err) {
    loadingEl.style.display = 'none';
    document.getElementById('error').style.display = '';
    document.getElementById('error').textContent = 'Error loading data: ' + err.message;
    console.error(err);
  }
}

function renderRow(tbody, pool, globalStart, globalEnd, isAllTasks) {
  const tr = document.createElement('tr');
  if (isAllTasks) tr.className = 'all-tasks-row';

  // Pool name
  const nameTd = document.createElement('td');
  nameTd.className = 'pool-name';
  nameTd.textContent = pool.name;
  nameTd.title = pool.name;
  tr.appendChild(nameTd);

  // Placeholder stat cells (filled by materializeRow)
  const statCells = [];
  for (let i = 0; i < 7; i++) {
    const td = document.createElement('td');
    td.className = 'num';
    tr.appendChild(td);
    statCells.push(td);
  }

  // Track canvas
  const trackTd = document.createElement('td');
  trackTd.className = 'track-cell';
  const container = document.createElement('div');
  container.className = 'track-container';
  const canvas = document.createElement('canvas');
  canvas.className = 'track-canvas';
  canvas.width = 0;
  const tooltip = document.createElement('div');
  tooltip.className = 'track-tooltip';
  const btn = document.createElement('button');
  btn.className = 'profiler-btn';
  btn.textContent = 'Profiler';
  btn.title = 'Open in Firefox Profiler';
  btn.onclick = async () => {
    btn.disabled = true;
    try {
      const tasks = await getProfilerTasks(pool);
      await new Promise(r => setTimeout(r, 0));
      await openInProfiler(tasks, pool.name, pool.timeSeries);
    } catch (err) {
      console.error(err);
      alert('Failed to load task data: ' + err.message);
    } finally {
      btn.disabled = false;
    }
  };
  container.appendChild(canvas);
  container.appendChild(tooltip);
  container.appendChild(btn);
  trackTd.appendChild(container);
  tr.appendChild(trackTd);

  tbody.appendChild(tr);

  const row = { tr, pool, name: pool.name.toLowerCase(), isAllTasks, canvas, tooltip, statCells, globalStart, globalEnd, materialized: false };
  allRows.push(row);
  return row;
}

function materializeRow(row, trackW, trackH) {
  if (row.materialized) return;
  row.materialized = true;

  const { pool, statCells, canvas, tooltip, globalStart, globalEnd } = row;
  const stats = pool.stats;

  const cells = [
    { text: formatNumber(stats.totalJobs), tip: jobsByProject(pool.tasks) },
    { text: formatNumber(stats.maxRunning) },
    { text: formatNumber(stats.maxQueued) },
    { text: formatDuration(stats.minQueueTime),    color: durationColorClass(stats.minQueueTime) },
    { text: formatDuration(stats.medianQueueTime), color: durationColorClass(stats.medianQueueTime) },
    { text: formatDuration(stats.p90QueueTime),    color: durationColorClass(stats.p90QueueTime) },
    stats.expiredCount
      ? { text: stats.expiredCount + ' expired', color: 'qt-red' }
      : { text: formatDuration(stats.maxQueueTime), color: durationColorClass(stats.maxQueueTime) },
  ];
  for (let i = 0; i < cells.length; i++) {
    const td = statCells[i];
    const cell = cells[i];
    td.textContent = cell.text;
    if (cell.color) td.className = 'num ' + cell.color;
    if (cell.tip) td.title = cell.tip;
  }

  const timeSeries = pool.timeSeries;
  drawTrack(canvas, timeSeries, globalStart, globalEnd, trackW, trackH);

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const frac = x / rect.width;
    const time = globalStart + frac * (globalEnd - globalStart);

    let lo = 0, hi = timeSeries.length - 1;
    let running = 0, total = 0, expired = 0;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (timeSeries[mid].time <= time) {
        running = timeSeries[mid].running;
        total = timeSeries[mid].total;
        expired = timeSeries[mid].expired;
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }

    const queued = total - running;
    const d = new Date(time);
    const timeStr = d.toLocaleTimeString(undefined, { timeZone: 'UTC' });
    let tip = `${timeStr} \u2014 ${running} running, ${queued} queued`;
    if (expired > 0) tip += `, ${expired} queued until expiration`;
    tooltip.textContent = tip;
    tooltip.style.display = 'block';
    tooltip.style.left = Math.min(x, rect.width - 200) + 'px';
  });

  canvas.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });
}

function formatDateUTC(ms) {
  return new Date(ms).toLocaleDateString(undefined, {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC'
  });
}

function renderSummary(allTasks, pools, globalStart, globalEnd) {
  const summary = document.getElementById('summary');
  const date = formatDateUTC(globalStart);
  const expiredCount = allTasks.filter(t => t._expired).length;

  summary.innerHTML =
    '<div class="summary-stat"><span class="value">' + date + '</span><span class="label">UTC</span></div>' +
    '<div class="summary-stat"><span class="value">' + formatNumber(pools.length) + '</span><span class="label">Worker Pools</span></div>' +
    '<div class="summary-stat"><span class="value">' + formatNumber(allTasks.length) + '</span><span class="label">Total Jobs</span></div>' +
    (expiredCount ? '<div class="summary-stat"><span class="value">' + formatNumber(expiredCount) + '</span><span class="label">Expired</span></div>' : '');
}

function sortPools(pools, key, desc) {
  const getter = key === 'name'
    ? (p) => p.name.toLowerCase()
    : key === 'totalJobs'
    ? (p) => p.tasks.length
    : (p) => p.stats[key] ?? -Infinity;

  pools.sort((a, b) => {
    const va = getter(a), vb = getter(b);
    if (va < vb) return desc ? 1 : -1;
    if (va > vb) return desc ? -1 : 1;
    return 0;
  });
}

let rowObserver = null;

function observeRows() {
  if (rowObserver) rowObserver.disconnect();

  // Read track canvas dimensions once (single reflow) before materializing anything
  const firstCanvas = allRows.length ? allRows[0].canvas : null;
  const trackW = firstCanvas ? firstCanvas.clientWidth : 400;
  const trackH = firstCanvas ? firstCanvas.clientHeight : 36;

  // Materialize the first visible rows synchronously to avoid flicker.
  // Each row is ~50px tall; 30 rows covers most viewports.
  let count = 0;
  for (const row of allRows) {
    if (row.materialized || row.tr.style.display === 'none') continue;
    materializeRow(row, trackW, trackH);
    if (++count >= 30) break;
  }

  // Observe remaining rows for lazy materialization on scroll
  rowObserver = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (entry.isIntersecting) {
        const row = entry.target._poolRow;
        if (row) materializeRow(row, trackW, trackH);
        rowObserver.unobserve(entry.target);
      }
    }
  });
  for (const row of allRows) {
    if (!row.materialized) {
      row.tr._poolRow = row;
      rowObserver.observe(row.tr);
    }
  }
}

function renderAllRows() {
  const { allPool, pools, globalStart, globalEnd } = renderContext;
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  allRows = [];

  sortPools(pools, currentSort.key, currentSort.desc);

  renderRow(tbody, allPool, globalStart, globalEnd, true);
  for (const pool of pools) {
    renderRow(tbody, pool, globalStart, globalEnd, false);
  }

  // Re-apply filter then observe visible rows
  applyFilter();
  observeRows();
}

function applyFilter() {
  const query = document.getElementById('filter').value.toLowerCase().trim();
  for (const row of allRows) {
    if (row.isAllTasks) continue;
    row.tr.style.display = (!query || row.name.includes(query)) ? '' : 'none';
  }
  // Sync filter to URL
  const url = new URL(location);
  if (query) {
    url.searchParams.set('filter', query);
  } else {
    url.searchParams.delete('filter');
  }
  history.replaceState(null, '', url);
}

let topProjectSet = new Set(); // populated in setupControls

function rebuildForProject(project) {
  currentProject = project;
  let rows;
  if (!project) {
    rows = allParsedRows;
  } else if (project === '_other') {
    rows = allParsedRows.filter(r => !topProjectSet.has(r.project || 'unknown'));
  } else {
    rows = allParsedRows.filter(r => r.project === project);
  }

  const byPool = new Map();
  for (const row of rows) {
    const pool = row.task_queue_id || 'unknown';
    if (!byPool.has(pool)) byPool.set(pool, []);
    byPool.get(pool).push(row);
  }

  function lazyPool(name, tasks) {
    const pool = { name, tasks };
    let _stats, _timeSeries;
    Object.defineProperties(pool, {
      stats: { get() { return _stats || (_stats = computeStats(tasks)); } },
      timeSeries: { get() { return _timeSeries || (_timeSeries = buildTimeSeries(tasks)); } },
    });
    return pool;
  }

  const pools = [];
  for (const [name, tasks] of byPool) {
    pools.push(lazyPool(name, tasks));
  }

  const allPool = lazyPool('All Tasks', rows);

  renderContext = { allPool, pools, globalStart: globalTimeStart, globalEnd: globalTimeEnd };
  renderSummary(rows, pools, globalTimeStart, globalTimeEnd);
  renderAllRows();

  // Sync to URL
  const url = new URL(location);
  if (project) {
    url.searchParams.set('project', project);
  } else {
    url.searchParams.delete('project');
  }
  history.replaceState(null, '', url);
}

function updateSortIndicators() {
  for (const th of document.querySelectorAll('th.sortable')) {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.sort === currentSort.key) {
      th.classList.add(currentSort.desc ? 'sort-desc' : 'sort-asc');
    }
  }
}

function setupControls() {
  if (!controlsInitialized) {
    const input = document.getElementById('filter');
    const clearBtn = document.getElementById('filter-clear');
    const params = new URLSearchParams(location.search);
    const initialFilter = params.get('filter');
    if (initialFilter) {
      input.value = initialFilter;
      clearBtn.hidden = false;
    }
    input.addEventListener('input', () => {
      clearBtn.hidden = !input.value;
      applyFilter();
    });
    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearBtn.hidden = true;
      applyFilter();
      input.focus();
    });

    // Date selector
    const dateSelect = document.getElementById('date-select');
    if (availableDates.length > 0) {
      for (const d of availableDates) {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        if (d === currentDate) opt.selected = true;
        dateSelect.appendChild(opt);
      }
      dateSelect.addEventListener('change', () => switchDate(dateSelect.value));
    } else {
      dateSelect.hidden = true;
    }

    // Sort header clicks
    for (const th of document.querySelectorAll('th.sortable')) {
      th.addEventListener('click', () => {
        const key = th.dataset.sort;
        if (currentSort.key === key) {
          currentSort.desc = !currentSort.desc;
        } else {
          currentSort.key = key;
          currentSort.desc = key !== 'name';
        }
        updateSortIndicators();
        renderAllRows();
      });
    }

    // Restore project from URL
    const initialProject = params.get('project');
    if (initialProject) {
      currentProject = initialProject;
    }

    controlsInitialized = true;
  }

  // Project filter buttons — rebuilt when data changes (date switch)
  const projects = new Map();
  for (const row of allParsedRows) {
    const proj = row.project || 'unknown';
    projects.set(proj, (projects.get(proj) || 0) + 1);
  }
  const sorted = [...projects.entries()]
    .filter(([name]) => name !== 'unknown')
    .sort((a, b) => b[1] - a[1]);
  const topProjects = sorted.slice(0, 9).map(([name]) => name);
  topProjectSet = new Set(topProjects);

  const container = document.getElementById('project-filters');
  container.innerHTML = '';
  const setActive = (activeBtn) => {
    for (const b of container.querySelectorAll('button')) b.classList.remove('active');
    activeBtn.classList.add('active');
  };

  const allBtn = document.createElement('button');
  allBtn.textContent = 'All';
  allBtn.className = currentProject ? '' : 'active';
  allBtn.onclick = () => { setActive(allBtn); rebuildForProject(''); };
  container.appendChild(allBtn);

  for (const proj of topProjects) {
    const btn = document.createElement('button');
    btn.textContent = proj;
    if (proj === currentProject) btn.className = 'active';
    btn.onclick = () => { setActive(btn); rebuildForProject(proj); };
    container.appendChild(btn);
  }

  const hasOther = sorted.length > 9 || projects.has('unknown');
  if (hasOther) {
    const btn = document.createElement('button');
    btn.textContent = 'Other';
    if (currentProject === '_other') btn.className = 'active';
    btn.onclick = () => { setActive(btn); rebuildForProject('_other'); };
    container.appendChild(btn);
  }

  updateSortIndicators();
}

// ==================== Main ====================

function processData(rows, dayStartMs) {
  const loadingEl = document.getElementById('loading');

  loadingEl.textContent = 'Processing ' + formatNumber(rows.length) + ' tasks...';

  // Pre-parse timestamps and filter out dependency-blocked expired tasks
  for (const row of rows) {
    row._scheduledMs = Number(row.scheduled);
    row._startedMs = row.started ? Number(row.started) : null;
    row._resolvedMs = Number(row.resolved);
    row._expired = row.state === 'exception' && row.reason_resolved === 'deadline-exceeded';
  }
  // Remove tasks that never ran:
  // - dependency-blocked expired tasks (scheduled === resolved)
  // - canceled tasks that never started
  const filtered = rows.filter(r => {
    if (r._startedMs) return true;
    if (r._expired) return r._scheduledMs !== r._resolvedMs;
    if (r.reason_resolved === 'canceled') return false;
    return true;
  });

  // Fixed 24h time range
  globalTimeStart = dayStartMs;
  globalTimeEnd = dayStartMs + 24 * 3600 * 1000;

  allParsedRows = filtered;

  // Render
  loadingEl.style.display = 'none';
  document.getElementById('date-select').style.display = '';
  document.querySelector('.filter-wrap').style.display = '';
  document.getElementById('project-filters').style.display = '';
  document.querySelector('.pool-table-wrapper').style.display = '';

  setupControls();
  rebuildForProject(currentProject);

  // Prefetch full task data on first hover of any Profiler button
  document.querySelector('.pool-table-wrapper').addEventListener('mouseover', function prefetch(e) {
    if (!e.target.closest('.profiler-btn')) return;
    this.removeEventListener('mouseover', prefetch);
    ensureFullTaskData();
  });
}

async function main() {
  const loadingEl = document.getElementById('loading');
  const errorEl = document.getElementById('error');

  try {
    // Speculatively fetch yesterday's summary in parallel with the index,
    // since it's almost always the most recent date available.
    const params = new URLSearchParams(location.search);
    const requestedDate = params.get('date');
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    const guessDate = requestedDate || yesterday;
    document.getElementById('summary-date').textContent =
      formatDateUTC(Date.parse(guessDate + 'T00:00:00Z'));
    const speculativeFetch = fetchFromCI('worker-data', 'workers-' + guessDate + '.json');

    loadingEl.textContent = 'Fetching worker data...';
    const indexResponse = await fetchFromCI('worker-data', 'index.json');
    if (!indexResponse.ok) throw new Error('Failed to fetch index: HTTP ' + indexResponse.status);
    const index = await indexResponse.json();
    const dates = index.dates;
    if (!dates || !dates.length) throw new Error('No data dates available');

    const date = dates.includes(requestedDate) ? requestedDate : dates[0];
    availableDates = dates;
    currentDate = date;

    let summaryResponse;
    if (date === guessDate) {
      summaryResponse = await speculativeFetch;
    } else {
      summaryResponse = await fetchFromCI('worker-data', 'workers-' + date + '.json');
    }
    if (!summaryResponse.ok) throw new Error('Failed to fetch data: HTTP ' + summaryResponse.status);
    const summaryData = await summaryResponse.json();
    const rows = decodeSummaryData(summaryData);

    const dayStartMs = Date.parse(date + 'T00:00:00Z');
    processData(rows, dayStartMs);
  } catch (err) {
    loadingEl.style.display = 'none';
    errorEl.style.display = '';
    errorEl.textContent = 'Error: ' + err.message;
    console.error(err);
  }
}

main();
